<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile của Dương HUST</title>
    <style>
        /* CSS giúp trang web đẹp hơn */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
            border-top: 8px solid #d32f2f; /* Màu đỏ Bách Khoa */
        }
        h1 { color: #d32f2f; margin-bottom: 10px; }
        p { color: #555; font-size: 1.2rem; }
        .hust-badge {
            background: #d32f2f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chào mừng bạn! 🚀</h1>
        <p>Mình là <b>Dương</b>, sinh viên HUST.</p>
        <div class="hust-badge">Đại học Bách Khoa Hà Nội</div>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #888;">Trang web này được deploy tự động qua GitHub Pages</p>
    </div>
</body>
</html>
